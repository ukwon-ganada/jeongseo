.gk-root *{box-sizing:border-box;}

.gk-header{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; row-gap:10px; flex-wrap:wrap; margin:4px 4px 14px;
}
.gk-head-right{display:flex; align-items:center; gap:10px;}
.gk-search{
  flex:1 1 220px; display:flex; align-items:center; gap:8px;
  max-width:380px; margin:0 auto; min-width:0;
  background:#fff; border:1px solid var(--line2); border-radius:980px;
  padding:8px 14px; transition:border-color .12s ease, box-shadow .12s ease;
}
.gk-search:focus-within{border-color:rgba(217,119,87,0.55); box-shadow:0 0 0 3px rgba(217,119,87,0.12);}
.gk-search > svg{flex-shrink:0; color:var(--gray);}
.gk-search-input{
  flex:1; min-width:0; border:none; background:transparent; outline:none;
  font:inherit; font-size:15px; color:var(--ink); letter-spacing:-0.2px;
}
.gk-search-input::placeholder{color:var(--gray2);}
.gk-search-clear{
  flex-shrink:0; width:18px; height:18px; border:none; border-radius:50%;
  background:rgba(124,118,104,0.16); color:var(--ink2); padding:0;
  font-size:14px; line-height:1; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.gk-search-clear:hover{background:rgba(124,118,104,0.28);}
.gk-noresult{
  padding:40px 20px; text-align:center; color:var(--gray);
  font-size:14.5px; letter-spacing:-0.2px;
}
.gk-tabs{display:inline-flex; background:rgba(124,118,104,0.12); border-radius:11px; padding:3px;}
.gk-tab{
  border:none; background:transparent; font:inherit; font-size:13.5px; font-weight:600;
  color:var(--ink2); padding:8px 14px; border-radius:8px; cursor:pointer;
  white-space:nowrap; letter-spacing:-0.2px; transition:color .12s ease;
}
.gk-tab.on{
  background:#fff; color:var(--accent);
  box-shadow:0 1px 2px rgba(0,0,0,0.1),0 1px 0.5px rgba(0,0,0,0.04);
}
.gk-title-wrap{display:flex; flex-direction:column; gap:1px; min-width:0;}
.gk-title{
  font-family:"Tiempos Headline","Iowan Old Style","Georgia",ui-serif,serif;
  font-size:23px; font-weight:600; letter-spacing:-0.3px;
  margin:0; color:var(--ink); line-height:1.18;
}
.gk-count{font-size:13px; color:var(--gray); font-weight:500;}

.gk-add{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--blue); color:#fff; border:none;
  padding:9px 15px; border-radius:980px;
  font-size:15px; font-weight:600; letter-spacing:-0.2px;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:transform .12s ease, filter .12s ease;
}
.gk-add:hover{filter:brightness(1.05);}
.gk-add:active{transform:scale(0.96);}

.gk-card{
  background:var(--card); border-radius:18px;
  border:1px solid var(--line);
  box-shadow:0 1px 2px rgba(60,50,40,0.04),0 10px 30px rgba(60,50,40,0.05);
  overflow:hidden;
}
.gk-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
.gk-table{min-width:880px;}

.gk-thead{
  display:flex; align-items:stretch;
  background:#FAF8F2; border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:2;
}
.gk-th{
  padding:11px 14px; font-size:12.5px; font-weight:600;
  color:var(--gray); letter-spacing:-0.1px;
  display:flex; align-items:center;
  border-right:1px solid var(--line2);
}
.gk-th-actions{border-right:none;}
.gk-flex{flex:1 1 auto;}

.gk-row{
  display:flex; align-items:stretch;
  border-bottom:1px solid var(--line2);
  transition:background .1s ease;
}
.gk-row:last-child{border-bottom:none;}
.gk-row:hover{background:#FAF8F1;}
.gk-row.is-claimed{background:rgba(124,118,104,0.08);}
.gk-row.is-claimed:hover{background:rgba(124,118,104,0.13);}

.gk-cell{
  display:flex; align-items:center;
  padding:4px 6px; min-height:54px;
  border-right:1px solid var(--line2);
}
.gk-cell-actions{border-right:none; justify-content:center;}

.gk-input{
  width:100%; border:none; background:transparent;
  font:inherit; font-size:15px; color:var(--ink);
  padding:8px 6px; border-radius:8px; letter-spacing:-0.2px;
  font-variant-numeric:tabular-nums;
  outline:none; transition:background .12s ease, box-shadow .12s ease;
}
.gk-input::placeholder{color:var(--gray2);}
.gk-input:focus{background:rgba(217,119,87,0.09); box-shadow:inset 0 0 0 1px rgba(217,119,87,0.30);}
.gk-strong{font-weight:600;}

/* ── 사건 자동완성 드롭다운 (정서 cases 조회) ── */
.gk-ac-drop{
  z-index:9000; background:#fff; border:1px solid var(--line);
  border-radius:11px; box-shadow:0 10px 30px rgba(60,50,40,0.16);
  max-height:264px; overflow-y:auto; padding:4px;
}
.gk-ac-item{
  padding:9px 11px; cursor:pointer; border-radius:8px;
  display:flex; flex-direction:column; gap:2px;
}
.gk-ac-item:hover, .gk-ac-item.on{background:#FAF6EE;}
.gk-ac-code{font-size:13.5px; font-weight:600; color:var(--ink); letter-spacing:-0.2px;}
.gk-ac-sub{font-size:12px; color:var(--gray);}

/* 최근기일 */
.gk-date-btn{
  display:inline-flex; align-items:center; gap:7px;
  background:transparent; border:none; cursor:pointer;
  padding:8px 8px; border-radius:8px; width:100%;
  font:inherit; transition:background .12s ease;
}
.gk-date-btn:hover{background:rgba(124,118,104,0.10);}
.gk-date-placeholder{color:var(--gray2); font-size:15px;}
.gk-tag{
  font-size:11px; font-weight:700; letter-spacing:0.2px;
  padding:2px 7px; border-radius:6px; line-height:1.4;
}
.tag-gp{color:var(--slate); background:rgba(124,122,114,0.14);}
.tag-sgo{color:var(--accent); background:rgba(217,119,87,0.15);}
.tag-cancel{color:var(--red); background:rgba(192,57,43,0.13);}
.gk-date-val{font-size:15px; font-weight:600; color:var(--ink); letter-spacing:-0.2px;}
.gk-date-val.is-soon{color:var(--red);}
.gk-date-val.is-past{color:var(--gray2);}

/* 세그먼트 */
.gk-seg{
  display:inline-flex; background:rgba(124,118,104,0.12);
  border-radius:9px; padding:2px; width:100%;
}
.gk-seg-lg{width:100%; padding:3px; border-radius:11px;}
.gk-seg-item{
  flex:1 1 0; border:none; background:transparent;
  font:inherit; font-size:13px; font-weight:600; letter-spacing:-0.2px;
  color:var(--ink2); padding:6px 4px; border-radius:7px;
  cursor:pointer; transition:all .15s ease; white-space:nowrap;
}
.gk-seg-lg .gk-seg-item{font-size:15px; padding:9px 4px; border-radius:9px;}
.gk-seg-item.active{
  background:#fff;
  box-shadow:0 1px 2px rgba(0,0,0,0.12),0 1px 0.5px rgba(0,0,0,0.04);
  font-weight:600;
}

/* 삭제 */
.gk-del-btn{
  border:none; background:transparent; color:var(--gray2);
  width:32px; height:32px; border-radius:8px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .12s ease, color .12s ease, background .12s ease;
}
.gk-row:hover .gk-del-btn{opacity:1;}
.gk-del-btn:hover{color:var(--red); background:rgba(192,57,43,0.10);}
.gk-del-confirm{display:flex; flex-direction:column; gap:3px; width:42px;}
.gk-del-yes{
  border:none; background:var(--red); color:#fff;
  font:inherit; font-size:11px; font-weight:600;
  padding:4px 0; border-radius:6px; cursor:pointer;
}
.gk-del-no{
  border:none; background:rgba(124,118,104,0.16); color:var(--ink2);
  font:inherit; font-size:11px; font-weight:600;
  padding:4px 0; border-radius:6px; cursor:pointer;
}

/* 빈 상태 */
.gk-empty{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:64px 24px; text-align:center; color:var(--gray);
}
.gk-empty-icon{
  width:64px; height:64px; border-radius:18px;
  background:rgba(124,118,104,0.12); color:var(--gray);
  display:flex; align-items:center; justify-content:center; margin-bottom:16px;
}
.gk-empty-title{font-size:17px; font-weight:600; color:var(--ink2); margin:0 0 4px;}
.gk-empty-sub{font-size:14px; color:var(--gray); margin:0 0 20px;}
.gk-empty-btn{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--blue); color:#fff; border:none;
  padding:9px 18px; border-radius:980px;
  font-size:15px; font-weight:600; cursor:pointer;
}
.gk-empty-btn:active{transform:scale(0.96);}

/* 하단 시트 */
.gk-sheet-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,0.4);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:50; animation:gk-fade .2s ease;
}
.gk-sheet{
  background:#fff; width:100%; max-width:520px;
  border-radius:22px 22px 0 0; padding:8px 20px 28px;
  box-shadow:0 -8px 40px rgba(0,0,0,0.18);
  animation:gk-slide .28s cubic-bezier(.32,.72,0,1);
}
.gk-sheet-grip{
  width:38px; height:5px; border-radius:3px;
  background:var(--gray2); margin:8px auto 10px;
}
.gk-sheet-head{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:18px;
}
.gk-sheet-title{font-size:17px; font-weight:600; color:var(--ink);}
.gk-sheet-done{
  border:none; background:transparent; color:var(--blue);
  font:inherit; font-size:16px; font-weight:600; cursor:pointer; padding:4px;
}
.gk-sheet-section{margin-bottom:18px;}
.gk-field-label{
  display:block; font-size:13px; font-weight:600;
  color:var(--gray); margin-bottom:8px; letter-spacing:-0.1px;
}
.gk-date-input{
  width:100%; font:inherit; font-size:16px; color:var(--ink);
  border:1px solid var(--line); border-radius:11px;
  padding:13px 14px; background:#fff; outline:none;
}
.gk-date-input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(217,119,87,0.18);}
.gk-clear-date{
  width:100%; border:none; background:rgba(192,57,43,0.10);
  color:var(--red); font:inherit; font-size:15px; font-weight:600;
  padding:12px; border-radius:11px; cursor:pointer; margin-top:4px;
}

@keyframes gk-fade{from{opacity:0;}to{opacity:1;}}
@keyframes gk-slide{from{transform:translateY(100%);}to{transform:translateY(0);}}

@media (prefers-reduced-motion: reduce){
  .gk-sheet,.gk-sheet-backdrop{animation:none;}
  .gk-add:active,.gk-empty-btn:active{transform:none;}
}

/* ── 보수 청구 버튼 / 완료 ── */
.gk-fee-btn{
  width:100%; border:1px solid var(--accent); background:transparent;
  color:var(--accent); font:inherit; font-size:13px; font-weight:600;
  padding:7px 8px; border-radius:9px; cursor:pointer; letter-spacing:-0.2px;
  transition:background .12s ease, transform .1s ease;
}
.gk-fee-btn:hover{background:rgba(217,119,87,0.08);}
.gk-fee-btn:active{transform:scale(0.97);}
.gk-fee-done{
  width:100%; display:inline-flex; align-items:center; justify-content:center; gap:5px;
  border:none; background:rgba(107,142,90,0.14); color:#54703F;
  font:inherit; font-size:12.5px; font-weight:600;
  padding:7px 6px; border-radius:9px; cursor:pointer; letter-spacing:-0.3px;
  transition:background .12s ease;
}
.gk-fee-done:hover{background:rgba(107,142,90,0.22);}
.gk-fee-done svg{color:var(--green);}

/* ── 신청서 화면 ── */
.gk-form-overlay{
  position:fixed; inset:0; z-index:60; background:#EAE7DE;
  display:flex; flex-direction:column; animation:gk-fade .2s ease;
}
.gk-form-bar{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:11px 16px; background:rgba(240,238,230,0.9);
  -webkit-backdrop-filter:saturate(180%) blur(12px);
  backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid var(--line); flex-shrink:0;
}
.gk-bar-back{
  border:none; background:transparent; color:var(--accent);
  font:inherit; font-size:16px; font-weight:600; cursor:pointer; padding:4px 2px;
}
.gk-bar-title{font-size:15px; font-weight:600; color:var(--ink2); letter-spacing:-0.2px;}
.gk-bar-actions{display:flex; gap:8px;}
.gk-bar-pdf{
  border:1px solid var(--line); background:#fff; color:var(--ink2);
  font:inherit; font-size:14px; font-weight:600; padding:8px 14px;
  border-radius:980px; cursor:pointer;
}
.gk-bar-pdf:hover{background:#FAF8F2;}
.gk-bar-done{
  border:none; background:var(--accent); color:#fff;
  font:inherit; font-size:14px; font-weight:600; padding:8px 16px;
  border-radius:980px; cursor:pointer; transition:transform .1s ease;
}
.gk-bar-done:active{transform:scale(0.97);}
.gk-bar-cancel{
  border:1px solid rgba(192,57,43,0.4); background:#fff; color:var(--red);
  font:inherit; font-size:14px; font-weight:600; padding:8px 14px;
  border-radius:980px; cursor:pointer; transition:background .12s ease;
}
.gk-bar-cancel:hover{background:rgba(192,57,43,0.08);}
.gk-form-scroll{flex:1 1 auto; overflow:auto; padding:24px 16px 60px; -webkit-overflow-scrolling:touch;}

/* ── 문서 본체 ── */
.gk-doc{
  width:760px; margin:0 auto; background:#fff; color:#000;
  padding:34px 40px 40px; box-shadow:0 4px 24px rgba(0,0,0,0.08);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
}

/* ── 항소장 표준양식 ── */
.ap-doc{
  padding:64px 60px 80px;
  font-family:"휴먼명조","HYMyeongJo","바탕","Batang","AppleMyungjo",serif;
  color:#000; font-size:12pt; line-height:1.9;
}
.ap-title{
  font-family:"휴먼고딕","HYGothic","돋움","Dotum","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  font-size:20pt; font-weight:700; text-align:center;
  letter-spacing:0.4em; margin:20mm 0 13mm; padding-left:0.4em;
}
.ap-row{display:flex; align-items:baseline; margin:0;}
.ap-label{
  width:92px; flex:0 0 92px; font-weight:700; letter-spacing:0.06em;
}
.ap-val{flex:1 1 auto;}
.ap-body{margin:17mm 0 0; padding-left:14mm;}
.ap-sign{margin-top:46mm; padding-left:52%;}
.ap-sign p{margin:0;}
.ap-line2{padding-left:0.8em;}
.ap-court{
  font-family:"휴먼고딕","HYGothic","돋움","Dotum","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  font-size:20pt; font-weight:700; letter-spacing:-0.5px; margin:38mm 0 0;
}
.ap-court-gap{display:inline-block; width:1.6em;}
.ap-court-gui{font-size:13pt;}
.ap-seal-wrap{position:relative; display:inline-block;}
.ap-seal-wrap .gk-seal{
  left:auto; right:-1.4cm; top:50%; transform:translateY(-52%);
}
.gk-doc-title{text-align:center; font-size:22px; font-weight:800; letter-spacing:-0.5px; margin:0 0 22px;}
.gk-doc-box{border-top:1px solid #000; border-left:1px solid #000;}
.gk-doc-row{display:flex;}
.gk-doc-th{
  width:120px; flex-shrink:0; padding:9px 6px; text-align:center;
  font-size:13.5px; font-weight:600;
  border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center; justify-content:center;
}
.gk-doc-td{
  padding:6px 10px; border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center;
}
.gk-doc-sayu{
  padding:7px; text-align:center; font-size:14px; font-weight:600; letter-spacing:4px;
  border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center; justify-content:center;
}
.gk-doc-instr{
  width:220px; flex-shrink:0; padding:6px 4px; text-align:center; font-size:10.5px; line-height:1.3;
  border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center; justify-content:center;
}
.gk-doc-band{display:flex;}
.gk-doc-vlabel{
  width:30px; flex-shrink:0; font-size:13.5px; font-weight:600;
  border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center; justify-content:center;
  writing-mode:vertical-rl; text-orientation:upright; letter-spacing:2px;
}
.gk-doc-rows{display:flex; flex-direction:column;}
.gk-doc-rrow{display:flex; min-height:30px;}
.gk-doc-desc{
  padding:5px 9px; font-size:12.5px; line-height:1.35;
  border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center;
}
.gk-doc-desc-narrow{
  width:118px; flex-shrink:0; padding:5px 9px; font-size:12.5px;
  border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center;
}
.gk-doc-val{
  width:220px; flex-shrink:0; padding:4px 6px; font-size:12px;
  border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; align-items:center; justify-content:center; gap:2px; white-space:nowrap;
}
.gk-doc-copy{
  padding:5px 6px; border-right:1px solid #000; border-bottom:1px solid #000;
  display:flex; flex-wrap:wrap;
}
.gk-doc-etc-label{font-size:13px; font-weight:600; flex-shrink:0; margin-right:4px;}

.gk-doc-input{
  width:100%; border:none; background:transparent; outline:none;
  font:inherit; font-size:13.5px; color:#000; padding:2px 0;
}
.gk-doc-input::placeholder{color:#c4c0b6; font-size:12px;}
.gk-paren-wrap{display:inline-flex; align-items:center; white-space:nowrap;}
.gk-paren{
  width:30px; border:none; border-bottom:1px solid #999; background:transparent;
  outline:none; text-align:center; font:inherit; font-size:12px; color:#000;
  margin:0 2px; padding:0 1px;
}
.gk-paren-w{width:62px;}
.gk-paren:focus{border-bottom-color:var(--accent);}
.gk-docchk{
  width:18px; height:18px; border:1px solid #000; background:#fff;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#000; cursor:pointer; line-height:1; border-radius:2px;
}
.gk-docchk.on{color:var(--accent); border-color:var(--accent);}
.gk-copy-opt{
  width:50%; display:flex; align-items:center; gap:5px;
  border:none; background:transparent; cursor:pointer;
  font:inherit; font-size:11px; color:#000; text-align:left; padding:3px 2px;
}
.gk-copy-box{
  width:15px; height:15px; flex-shrink:0; border:1px solid #000; border-radius:2px;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:#000; line-height:1;
}
.gk-copy-opt.on .gk-copy-box{color:var(--accent); border-color:var(--accent);}

.gk-doc-statement{text-align:center; font-size:14px; margin:30px 0 26px; color:#000;}
.gk-doc-sign{text-align:center; margin-bottom:24px;}
.gk-doc-date{font-size:15px; margin:0 0 14px; color:#000; letter-spacing:1px;}
.gk-doc-attorney{font-size:15px; margin:0 0 6px; color:#000;}

/* ── 직인(도장) ── */
.gk-seal-wrap{position:relative; cursor:pointer; display:inline-block;}
.gk-seal{
  position:absolute; left:50%; top:50%;
  width:2cm; height:2cm;
  transform:translate(-50%, -62%);
  z-index:50; pointer-events:auto; user-select:none;
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}
.gk-doc-rrn{font-size:12.5px; color:#000; margin:0;}
.gk-doc-court{text-align:center; font-size:20px; font-weight:700; letter-spacing:6px; margin:26px 0 0; color:#000;}
.gk-sign-input{
  border:none; border-bottom:1px solid #aaa; background:transparent; outline:none;
  font:inherit; color:#000; text-align:center; padding:1px 4px; min-width:70px;
}
.gk-sign-input:focus{border-bottom-color:var(--accent);}
.gk-sign-rrn{min-width:130px;}
.gk-court-input{
  font-size:20px; font-weight:700; letter-spacing:3px; min-width:96px;
  border-bottom:1px solid transparent;
}
.gk-court-input:focus{border-bottom-color:var(--accent);}

/* ── 인쇄 / PDF 저장 ── */
@media print{
  @page{ size:A4; margin:13mm; }
  html, body{background:#fff !important; margin:0 !important; padding:0 !important; height:auto !important;}
  .gk-root{padding:0 !important;}
  /* 목록/헤더/모달 등 메인 화면은 인쇄 제외 → 빈 페이지 방지 */
  .gk-root > *:not(.gk-form-overlay){ display:none !important; }
  /* 서류 오버레이 고정 해제(모든 페이지 반복 방지) */
  .gk-form-overlay{
    position:static !important; inset:auto !important;
    height:auto !important; overflow:visible !important; background:#fff !important;
  }
  .gk-form-bar{ display:none !important; }
  .gk-form-scroll{
    position:static !important; overflow:visible !important;
    height:auto !important; padding:0 !important;
  }
  #fee-print{
    position:static !important; width:100% !important; margin:0 !important;
    padding:0 !important; box-shadow:none !important;
  }
  #appeal-print{
    position:static !important; width:100% !important; margin:0 !important;
    padding:22mm 16mm !important; box-sizing:border-box !important; box-shadow:none !important;
  }
  .no-print{display:none !important;}
  .gk-paren{border-bottom:1px solid #000 !important;}
  .gk-sign-input{border-bottom-color:#000 !important;}
  .gk-court-input{border-bottom-color:transparent !important;}
}

@media (max-width:520px){
  .gk-root{padding:10px;}
  .gk-add span{display:none;}
  .gk-add{padding:9px 11px;}
  .gk-import span{display:none;}
  .gk-import{padding:9px 11px;}
  .gk-title{font-size:20px;}
  .gk-form-scroll{padding:16px 8px 48px;}
  .gk-bar-pdf,.gk-bar-done,.gk-bar-cancel{padding:8px 11px; font-size:12.5px;}
  .gk-bar-title{display:none;}
  .gk-tab{padding:7px 11px; font-size:12.5px;}
  .gk-head-right{gap:8px;}
}

/* ── 입금 문자 붙여넣기 ── */
.gk-paste{
  background:#fff; border:1px solid var(--line); border-radius:16px;
  padding:16px 18px; margin-bottom:14px;
  box-shadow:0 1px 2px rgba(60,50,40,0.04);
}
.gk-paste-head{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:10px;}
.gk-paste-title{font-size:15px; font-weight:700; color:var(--ink); letter-spacing:-0.2px;}
.gk-paste-hint{font-size:12.5px; color:var(--gray); letter-spacing:-0.2px;}
.gk-paste-area{
  width:100%; min-height:64px; resize:vertical; box-sizing:border-box;
  border:1px solid var(--line); border-radius:11px; padding:11px 13px;
  font:inherit; font-size:14px; color:var(--ink); background:#FAF9F5; outline:none; line-height:1.5;
}
.gk-paste-area:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(217,119,87,0.14); background:#fff;}
.gk-paste-area::placeholder{color:var(--gray2);}
.gk-paste-actions{display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-top:10px;}
.gk-paste-clear{
  border:none; background:transparent; color:var(--gray);
  font:inherit; font-size:13px; font-weight:500; cursor:pointer; padding:8px 6px;
}
.gk-paste-btn{
  border:none; background:var(--accent); color:#fff;
  font:inherit; font-size:14px; font-weight:600; padding:9px 20px;
  border-radius:980px; cursor:pointer; transition:transform .1s ease, opacity .12s ease;
}
.gk-paste-btn:disabled{opacity:0.4; cursor:default;}
.gk-paste-btn:not(:disabled):active{transform:scale(0.97);}
.gk-paste-result{margin-top:12px; border-top:1px solid var(--line2); padding-top:11px;}
.gk-pr-ok{font-size:13.5px; color:#54703F; margin:0 0 5px; line-height:1.55; letter-spacing:-0.2px;}
.gk-pr-no{font-size:13px; color:var(--red); margin:0; line-height:1.55; letter-spacing:-0.2px;}

/* ── 보수표 셀 ── */
.gk-fee-text{font-size:15px; color:var(--ink); letter-spacing:-0.2px; padding:0 6px;}
.gk-fee-muted{color:var(--ink2);}
.gk-fee-date{
  width:100%; border:none; background:transparent; outline:none; cursor:pointer;
  font:inherit; font-size:14.5px; color:var(--gray2); padding:8px 6px; border-radius:8px;
  letter-spacing:-0.2px; transition:background .12s ease, box-shadow .12s ease;
}
.gk-fee-date.filled{color:var(--ink); font-weight:500;}
.gk-fee-date:focus{background:rgba(217,119,87,0.08); box-shadow:inset 0 0 0 1px rgba(217,119,87,0.25);}
.gk-amt-wrap{display:flex; align-items:center; width:100%;}
.gk-amt-input{
  flex:1 1 auto; min-width:0; border:none; background:transparent; outline:none;
  font:inherit; font-size:15px; color:var(--ink); text-align:right;
  padding:8px 4px; border-radius:8px; transition:background .12s ease, box-shadow .12s ease;
}
.gk-amt-input:focus{background:rgba(217,119,87,0.08); box-shadow:inset 0 0 0 1px rgba(217,119,87,0.25);}
.gk-amt-input::placeholder{color:var(--gray2);}
.gk-amt-won{font-size:13px; color:var(--gray); padding:0 6px 0 3px; flex-shrink:0;}

/* ── 최근기일 정렬 헤더 ── */
.gk-sort{
  display:inline-flex; align-items:center; gap:4px;
  border:none; background:transparent; cursor:pointer; padding:0;
  font:inherit; font-size:12.5px; font-weight:600; color:var(--gray); letter-spacing:-0.1px;
}
.gk-sort.on{color:var(--accent);}
.gk-sort svg{transition:opacity .12s ease;}
.gk-sort:hover{color:var(--ink2);}
.gk-sort.on:hover{color:var(--accent);}

/* ── 최근기일 임박도 음영 ── */
.gk-cell.heat-0{background:rgba(217,119,87,0.20);}
.gk-cell.heat-1{background:rgba(217,119,87,0.11);}
.gk-cell.heat-2{background:rgba(217,119,87,0.05);}
.gk-cell.heat-past{background:rgba(124,118,104,0.05);}
.gk-cell.heat-update{background:rgba(221,139,44,0.16);}
.gk-cell.heat-appeal{background:rgba(47,108,176,0.10);}
.gk-date-cell{display:flex; flex-direction:column; align-items:flex-start; gap:5px; width:100%;}
.gk-appeal{display:flex; gap:5px; padding-left:8px;}
.gk-appeal-pill{
  font-size:11px; font-weight:700; letter-spacing:-0.2px; line-height:1;
  padding:4px 8px; border-radius:7px; cursor:pointer;
  border:1px solid var(--line2); background:#fff;
  transition:background .12s ease, border-color .12s ease, color .12s ease, opacity .12s ease;
}
.gk-appeal-pill.ap-yes{color:var(--red);}
.gk-appeal-pill.ap-no{color:var(--apblue);}
.gk-appeal-pill.ap-yes:hover{border-color:var(--red);}
.gk-appeal-pill.ap-no:hover{border-color:var(--apblue);}
.gk-appeal-pill.ap-yes.on{background:var(--red); border-color:var(--red); color:#fff;}
.gk-appeal-pill.ap-no.on{background:var(--apblue); border-color:var(--apblue); color:#fff;}
.gk-appeal-pill.muted{opacity:0.4;}
.gk-appeal-write{
  width:100%; border:1px solid var(--slate); background:transparent;
  color:var(--slate); font:inherit; font-size:12.5px; font-weight:600;
  padding:7px 8px; border-radius:9px; cursor:pointer; letter-spacing:-0.3px;
  white-space:nowrap; transition:background .12s ease, transform .1s ease;
}
.gk-appeal-write:hover{background:rgba(124,122,114,0.10);}
.gk-appeal-write:active{transform:scale(0.97);}
.gk-date-update{flex-direction:column; align-items:flex-start; gap:3px;}
.gk-date-main{display:inline-flex; align-items:center; gap:7px;}
.gk-update-badge{
  font-size:10.5px; font-weight:700; color:#fff; background:var(--amber);
  padding:2px 7px; border-radius:6px; letter-spacing:-0.2px; line-height:1.45; white-space:nowrap;
}

/* ── 설정(톱니) 버튼 ── */
.gk-icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:38px; height:38px; padding:0;
  background:#fff; color:var(--ink2); border:1px solid var(--line);
  border-radius:980px; cursor:pointer; flex-shrink:0;
  transition:background .12s ease, color .12s ease;
}
.gk-icon-btn:hover{background:#FAF8F2; color:var(--accent);}

/* ── 애니메이션 (펄스) ── */
@keyframes gk-pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

/* ── Supabase 실시간 상태 ── */
.gk-sb-btn{
  display:inline-flex; align-items:center; gap:6px; flex-shrink:0;
  height:34px; padding:0 11px; border-radius:9px;
  border:1px solid var(--line2); background:#fff; color:var(--ink2);
  font:inherit; font-size:12.5px; font-weight:600; letter-spacing:-0.2px;
  cursor:pointer; transition:background .12s ease, border-color .12s ease;
}
.gk-sb-btn:hover{background:#FAF8F2;}
.gk-sb-btn.on{color:var(--green); border-color:rgba(107,142,90,0.4);}
.gk-sb-dot{
  width:8px; height:8px; border-radius:50%; background:var(--gray2); flex-shrink:0;
}
.gk-sb-btn.on .gk-sb-dot{background:var(--green); animation:gk-pulse 1.4s ease-in-out infinite;}

/* ── 모달 ── */
.gk-modal-backdrop{
  position:fixed; inset:0; z-index:70; background:rgba(20,18,16,0.45);
  display:flex; align-items:center; justify-content:center; padding:16px;
  animation:gk-fade .2s ease;
}
.gk-modal{
  background:#fff; width:100%; max-width:470px; max-height:90vh; overflow:auto;
  border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,0.3); padding:20px 22px 24px;
  box-sizing:border-box;
}
.gk-modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
.gk-modal-title{font-size:18px; font-weight:700; color:var(--ink); letter-spacing:-0.3px;}
.gk-modal-x{border:none; background:transparent; font-size:24px; color:var(--gray); cursor:pointer; line-height:1; padding:0 4px;}
.gk-modal-sub{font-size:13px; color:var(--gray); margin:0 0 14px; line-height:1.55;}
.gk-status{font-size:13px; border-radius:10px; padding:9px 12px; margin-bottom:14px; line-height:1.5;}
.gk-status.ok{background:rgba(107,142,90,0.12); color:#54703F;}
.gk-status.syncing{background:rgba(217,119,87,0.1); color:var(--accent);}
.gk-status.error{background:rgba(192,57,43,0.1); color:var(--red);}
.gk-status.idle{background:rgba(124,118,104,0.1); color:var(--gray);}
.gk-status-time{opacity:0.75;}
.gk-sync-box{
  margin-top:14px; padding:13px 14px; border:1px solid var(--line2);
  border-radius:12px; background:#FAF8F2;
}
.gk-sync-times{
  display:flex; flex-wrap:wrap; gap:6px 18px;
  font-size:12.5px; color:var(--ink2); letter-spacing:-0.2px;
}
.gk-sync-times b{color:var(--ink); font-weight:700;}
.gk-sync-hint{
  margin:9px 0 11px; font-size:11.5px; line-height:1.55;
  color:var(--gray); letter-spacing:-0.2px;
}
.gk-field{margin-bottom:12px;}
.gk-field label{display:block; font-size:13px; font-weight:600; color:var(--ink2); margin-bottom:6px; letter-spacing:-0.2px;}
.gk-field input{
  width:100%; box-sizing:border-box; border:1px solid var(--line); border-radius:10px;
  padding:11px 12px; font:inherit; font-size:14px; color:var(--ink); background:#FAF9F5; outline:none;
}
.gk-field input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(217,119,87,0.14); background:#fff;}
.gk-field input::placeholder{color:var(--gray2);}
.gk-modal-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
.gk-btn-primary{
  flex:1 1 auto; border:none; background:var(--accent); color:#fff;
  font:inherit; font-size:14px; font-weight:600; padding:11px 16px; border-radius:980px;
  cursor:pointer; transition:transform .1s ease;
}
.gk-btn-primary:active{transform:scale(0.98);}
.gk-btn-ghost{
  border:1px solid var(--line); background:#fff; color:var(--ink2);
  font:inherit; font-size:14px; font-weight:600; padding:11px 14px; border-radius:980px; cursor:pointer;
}
.gk-btn-ghost:hover{background:#FAF8F2;}
.gk-btn-ghost:disabled{opacity:0.4; cursor:default;}
.gk-btn-danger{
  border:none; background:rgba(192,57,43,0.1); color:var(--red);
  font:inherit; font-size:13px; font-weight:600; padding:11px 16px; border-radius:980px; cursor:pointer;
}
.gk-toggle-link{
  border:none; background:transparent; color:var(--accent);
  font:inherit; font-size:13px; font-weight:600; cursor:pointer; padding:8px 0;
}
.gk-code-row{display:flex; gap:8px;}
.gk-code-row input{flex:1 1 auto;}
.gk-guide{background:#FAF8F2; border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-top:8px;}
.gk-guide-t{font-size:13px; font-weight:700; color:var(--ink2); margin:0 0 8px;}
.gk-guide ol{margin:0; padding-left:18px;}
.gk-guide li{font-size:12.5px; color:var(--ink2); line-height:1.6; margin-bottom:3px;}
.gk-guide-warn{font-size:12px; color:var(--red); margin:9px 0 0; line-height:1.55;}

/* ── 공소장 업로드 ── */
.gk-import{
  display:inline-flex; align-items:center; gap:6px;
  background:#fff; color:var(--ink2); border:1px solid var(--line);
  padding:9px 14px; border-radius:980px;
  font:inherit; font-size:15px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:background .12s ease;
}
.gk-import:hover{background:#FAF8F2;}
.gk-import svg{color:var(--accent);}
.gk-imp-loading{text-align:center; padding:22px 8px 8px;}
.gk-spinner{
  width:34px; height:34px; margin:0 auto 16px;
  border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%;
  animation:gk-spin .8s linear infinite;
}
@keyframes gk-spin{to{transform:rotate(360deg);}}
.gk-imp-loading p{font-size:14px; color:var(--ink2); margin:4px 0; line-height:1.5;}
.gk-imp-hint{font-size:12.5px; color:var(--gray) !important;}
